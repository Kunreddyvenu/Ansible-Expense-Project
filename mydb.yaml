# 1 you have given worng name in vars_promot name ""
# 2 you have not given space between depedencies name and (-) symbol
# 3 in DB connection output ignore errors and registers should be in Playlist column
# 4 typo error at printout (connection)
# 5 most of the mistakes are space and typo 

- name: configure DB server
  hosts: [db]
  become: yes
  vars:
    host: 172.31.41.99
  vars_prompt:
    name: mysql_root_password
    prompt: please enter root password
    private: no  
  tasks:
  - name: install MYSQL server
    ansible.builtin.dnf:
      name: mysql-server
      state: installed
  - name: mysql service start and enable the service 
    ansible.builtin.service:
      name: mysqld
      state: started
      enabled: yes
  - name: install python and mysql dependencies
    ansible.builtin.pip:
      name:
       - PyMYSQL
       - Cryptography

  - name: check DB connection
    community.mysql.mysql_info:
      login_user: root
      login_password: "{{ mysql_root_password }}"
      login_host: "{{ host }}"
      filter: yes
    ignore_errors : yes
    register: mysql_connection_output

  - name: print output of sql connection
    ansible.builtin.debug:
      msg: "Output: {{ mysql_connection_output }}"

  - name: set mysql root user password
    ansible.builtin.command: "mysql_secure_installation --set-root-pass {{mysql_root_password}}"
    when: mysql_connection_output.failed is true
 
  






