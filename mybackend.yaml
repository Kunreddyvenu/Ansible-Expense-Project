- name: configure backend server
  hosts: [backend]
  become: yes
  vars:
    login_host: 172.31.41.99
    login_password: Root@321
  tasks:
  - name: disable default nodejs
    ansible.builtin.command: dnf module disable nodejs -y
  - name: enable nodejs:20
    ansible.builtin.command: dnf module enable nodejs:20 -y 
  - name: install nodejs
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: installed
    loop:
      - nodejs
      - mysql  
  - name: create app directory
    ansible.built.file:  
     path: /app
     state: directory
  - name: create user
    ansible.builtin.user:
      name: exepense
      state: present
  - name: download the code to twmp directoty
    ansible.builtin.get_url:
      url: https://expense-builds.s3.us-east-1.amazonaws.com/expense-backend-v2.zip
      dest: /tmp/backend.zip
  - name : unzip source code to /app
    ansible.built.unarchive:
      source: /tmp/backend.zip
      dest: /app
      remote_src: yes
  - name: install nodejs dependencies
    ansible.builtin.command: npm install 
    args:
      chdir: /app
  - name : copy backend service 
    ansible.builtin.copy:  
      src: backend.service
      dest: /etc/systemd/system/backend.service
  - name: install mysql and python dependencies 
    ansible.builtin.dnf:
     name:
      - PyMySQL
      - Cryptography
    executbale: pip3.9 
  - name: import all DB data into backend
    community.mysql.mysql_db: 
      login_user: root
      login_password: "{{ login_password }}"  
      login_host: "{{ login_host }}"
      target: /app/schema/backend.sql
      state: import
      name: all
  - name: system daemon reload 
    ansible.builtin.systemd_service:
      daemon_reload: true
  - name: start and enable the backend service
    ansible.builtin.service:
      name: backend
      state: started
      enabled: yes    
      

        




      
